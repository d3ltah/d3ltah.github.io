<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ramblings</title>
		<link rel="stylesheet" href="../style.css" />
		<link rel="stylesheet" href="blog.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
		/>

	<body>
		<div id="top">
			<h1 id="heading">→ ramblings</h1>
            <div id="top-buttons-container">
                <a href="https://d3ltah.github.io" target="_blank" rel="noopener noreferrer">
                    <i class="fa fa-home"></i>
                </a>
                <a id="theme-toggle" onclick="toggleTheme()">
                    <i class="fa fa-large fa-mug-hot"></i>
                </a>
            </div>
		</div>

			<section id="postlist"></section>

                    <p id="viewer-relative-time"></p>
                </div>
                <div id="viewer-content"></div>
            </section>
		</main>
